name: Build for OneThing Cloud (ARMv7)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境 (用于构建前端)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # 使用 Node 18 构建前端

      # 3. 设置 Go 环境
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      # 4. 构建前端 AND 后端
      - name: Build Frontend & Backend
        run: |
          # --- 第一步：构建前端 ---
          echo "🔨 Building Frontend..."
          cd web/default  # 进入前端源码目录 (One API 的前端通常在 web/default)
          npm install     # 安装前端依赖
          npm run build   # 编译生成静态文件 (生成 build 目录)
          cd ../..        # 返回根目录

          # --- 第二步：构建后端 ---
          echo "🔨 Building Backend for ARMv7..."
          export GOOS=linux
          export GOARCH=arm
          export GOARM=6
          export CGO_ENABLED=1
          
          # 安装 C 编译器
          sudo apt-get update && sudo apt-get install -y gcc-arm-linux-gnueabihf
          
          # 编译 (此时 Go 会检测到 web/default/build 目录已存在，并将其打包)
          go build -ldflags "-s -w" -o one-api-armv7
        env:
          CC: arm-linux-gnueabihf-gcc

      # 5. 上传结果
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-api-armv7-full
          path: one-api-armv7
